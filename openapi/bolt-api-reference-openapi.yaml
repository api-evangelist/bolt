      required:
      - product_id
      - name
      - unit_price
      - quantity
      - total_amount
      properties:
        product_id:
          type: string
          description: The ID of the product.
          example: '12345'
        variant_id:
          type: string
          description: Variation ID of the product, if applicable.
          example: '24'
